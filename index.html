<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DI Fight - Gateway Panel</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', 'Battambang', sans-serif; }
    .khmer-font { font-family: 'Battambang', sans-serif; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between antialiased selection:bg-indigo-500 selection:text-white">

  <!-- Production App Wrapper Canvas -->
  <div class="w-full max-w-xl mx-auto px-4 py-8 sm:py-14">
    
    <!-- Premium Header Component -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center p-3.5 bg-gradient-to-br from-indigo-500/10 to-purple-500/10 text-indigo-400 rounded-2xl mb-4 border border-indigo-500/20 shadow-xl backdrop-blur-md">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 009 11V7a4 4 0 00-8 0v4c0 2.517.553 4.938 1.553 7.106M12 11c1.744 2.772 2.753 6.054 2.753 9.571m3.44-2.04l-.054-.09A13.916 13.916 0 0115 11V7a4 4 0 018 0v4c0 2.517-.553 4.938-1.553 7.106M12 11V3m0 0L9.75 5.25M12 3l2.25 2.25" />
        </svg>
      </div>
      <h1 class="text-2xl font-extrabold tracking-wider text-white sm:text-3xl bg-clip-text bg-gradient-to-r from-white via-slate-200 to-slate-400">DI FIGHT GATEWAY</h1>
      <p class="khmer-font text-xs text-indigo-400 font-bold mt-2 tracking-wide uppercase">ប្រព័ន្ធគ្រប់គ្រង និងដោះស្រាយលីងចែករំលែកជំនាន់ថ្មី</p>
    </div>

    <!-- Interactive Global Status Alert Banner -->
    <div id="statusAlert" class="hidden mb-6 p-4 rounded-2xl border flex items-start space-x-3 transition-all duration-300 backdrop-blur-md animate-fade-in">
      <div id="statusIcon" class="flex-shrink-0 mt-0.5"></div>
      <div id="statusMessage" class="khmer-font text-sm font-medium leading-relaxed"></div>
    </div>

    <!-- Main Entry Module Form glassmorphism container -->
    <div class="bg-slate-900/40 border border-slate-900 rounded-3xl p-6 sm:p-8 shadow-2xl relative overflow-hidden backdrop-blur-xl">
      <div class="absolute top-0 left-0 right-0 h-[2px] bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500"></div>

      <form id="accountForm" onsubmit="handleFormSubmit(event)" class="space-y-5">
        
        <!-- Field Input Section: Team Member Selection -->
        <div>
          <label for="memberSelect" class="khmer-font block text-[11px] font-bold uppercase tracking-wider text-slate-400 mb-2">ឈ្មោះសមាជិក / Team Member Name *</label>
          <div class="relative">
            <select id="memberSelect" required class="khmer-font w-full bg-slate-950/90 border border-slate-800 rounded-xl px-4 py-3.5 text-slate-200 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition duration-200 appearance-none cursor-pointer">
              <option value="" disabled selected>-- សូមជ្រើសរើសឈ្មោះរបស់អ្នក --</option>
            </select>
            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
              <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
            </div>
          </div>
        </div>

        <!-- Field Input Section: Live Profile Link -->
        <div>
          <label for="fbLink" class="khmer-font block text-[11px] font-bold uppercase tracking-wider text-slate-400 mb-2">លីងគណនីហ្វេសប៊ុក / Facebook Profile or Share Link *</label>
          <input type="url" id="fbLink" required oninput="evaluateInputLink()" placeholder="https://www.facebook.com/share/..." 
                 class="w-full bg-slate-950/90 border border-slate-800 rounded-xl px-4 py-3.5 text-slate-200 placeholder-slate-700 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition duration-200">
        </div>

        <!-- Field Input Section: Live Automated Decoded Target Box Frame -->
        <div>
          <div class="flex items-center justify-between mb-2">
            <label id="uidFieldLabel" for="fbUid" class="khmer-font block text-[11px] font-bold uppercase tracking-wider text-slate-400">Facebook UID / Username (ស្វែងរកស្វ័យប្រវត្តិ)</label>
            <span id="uidStatusBadge" class="text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded-md bg-slate-900 text-slate-500 border border-slate-800 transition-all duration-200">No Link</span>
          </div>
          <div class="relative">
            <input type="text" id="fbUid" readonly placeholder="ប្រព័ន្ធកំពុងរង់ចាំលីងពីអ្នក..." 
                   class="w-full bg-slate-950/30 border border-slate-900/80 text-indigo-400 font-mono text-sm font-semibold rounded-xl px-4 py-3.5 cursor-not-allowed transition-all duration-200 focus:outline-none tracking-wide shadow-inner">
          </div>
        </div>

        <!-- Security Components Core Dual Matrix Field Section Layout -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label for="fbPw" class="khmer-font block text-[11px] font-bold uppercase tracking-wider text-slate-400 mb-2">លេខកូដសម្ងាត់ / Password *</label>
            <input type="text" id="fbPw" required placeholder="Account Password" 
                   class="w-full bg-slate-950/90 border border-slate-800 rounded-xl px-4 py-3.5 text-slate-200 placeholder-slate-700 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition duration-200">
          </div>
          <div>
            <label for="fb2fa" class="khmer-font block text-[11px] font-bold uppercase tracking-wider text-slate-400 mb-2">លេខកូដសុវត្ថិភាព / 2FA Recovery Key *</label>
            <input type="text" id="fb2fa" required placeholder="2FA Code" 
                   class="w-full bg-slate-950/90 border border-slate-800 rounded-xl px-4 py-3.5 text-slate-200 placeholder-slate-700 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition duration-200">
          </div>
        </div>

        <!-- Submission Trigger Element CTA Panel Button Container -->
        <button type="submit" id="submitBtn" class="khmer-font w-full bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-500 hover:to-indigo-600 text-white font-semibold py-4 px-4 rounded-xl shadow-xl shadow-indigo-950/50 transition-all duration-200 transform active:scale-[0.995] flex items-center justify-center space-x-2 cursor-pointer mt-2">
          <span>រក្សាទុកទិន្នន័យ / Submit Account</span>
        </button>
        
      </form>
    </div>
  </div>

  <footer class="w-full py-6 text-center border-t border-slate-900 bg-slate-950">
    <p class="text-[10px] text-slate-600 font-semibold tracking-widest uppercase">&copy; 2026 DI FIGHT OPERATIONS CENTER. PROTECTION SECURED.</p>
  </footer>

  <script>
    // PASTE YOUR GOOGLE APPS SCRIPT WEB APP EXTENSION MACRO ROUTING URL IN THE QUOTES BELOW:
    const API_ENDPOINT = "https://script.google.com/macros/s/AKfycbzqQlsfRaHjt4RdayZfWhEjmKfTp6M8RLcdc_4iSmmx5DFMWoEjGtj-89LrpcRqZBuA/exec";

    let lookupDebounceTimeout = null;

    document.addEventListener("DOMContentLoaded", function() {
      if (API_ENDPOINT.includes("YOUR_GOOGLE")) {
        displayAlert("Configuration Warning: Please assign your API_ENDPOINT deployment token variable inside your index.html file script tag configuration block context layout.", false);
        return;
      }
      loadTeamMembersList();
    });

    function callBackendAPI(payloadData, successCallback, failureCallback) {
      fetch(API_ENDPOINT, {
        method: "POST",
        mode: "cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payloadData)
      })
      .then(res => res.json())
      .then(data => successCallback(data))
      .catch(err => failureCallback(err));
    }

    function loadTeamMembersList() {
      callBackendAPI({ action: "getMembers" }, 
        function(response) {
          if (response.success && response.data) {
            const select = document.getElementById("memberSelect");
            response.data.forEach(function(item) {
              let opt = document.createElement("option");
              opt.value = item.name;
              opt.text = item.name;
              opt.setAttribute("data-row", item.rowIndex);
              select.appendChild(opt);
            });
          } else {
            displayAlert("បរាជ័យក្នុងការទទួលបានបញ្ជីឈ្មោះសមាជិកក្រុមពី Database Cloud.", false);
          }
        },
        function(err) {
          displayAlert("Error connecting to cloud network architecture mapping node system profiles.", false);
        }
      );
    }

    function evaluateInputLink() {
      const urlValue = document.getElementById("fbLink").value.trim();
      const uidField = document.getElementById("fbUid");
      const label = document.getElementById("uidFieldLabel");
      
      clearTimeout(lookupDebounceTimeout);
      
      uidField.readOnly = true;
      uidField.className = "w-full bg-slate-950/30 border border-slate-900/80 text-indigo-400 font-mono text-sm font-semibold rounded-xl px-4 py-3.5 cursor-not-allowed transition-all duration-200 focus:outline-none tracking-wide shadow-inner";
      label.className = "khmer-font block text-[11px] font-bold uppercase tracking-wider text-slate-400";
      label.innerText = "Facebook UID / Username (ស្វែងរកស្វ័យប្រវត្តិ)";

      if (!urlValue) {
        uidField.value = "";
        updateStatusBadge("No Link", "bg-slate-900 text-slate-500 border-slate-800");
        return;
      }

      let idMatch = urlValue.match(/[?&]id=(\d+)/) || urlValue.match(/\/people\/[^/]+\/(\d+)/);
      if (idMatch && idMatch[1]) {
        uidField.value = idMatch[1];
        updateStatusBadge("UID Detected", "bg-emerald-500/10 text-emerald-400 border-emerald-500/20");
        return;
      }

      updateStatusBadge("Analyzing Link...", "bg-indigo-500/10 text-indigo-400 border-indigo-500/20 animate-pulse");
      uidField.value = "Connecting to link resolver engine...";

      lookupDebounceTimeout = setTimeout(function() {
        callBackendAPI({ action: "resolveUrl", url: urlValue },
          function(response) {
            if (response.success && response.value) {
              uidField.value = response.value;
              updateStatusBadge("Resolved Successfully", "bg-emerald-500/10 text-emerald-400 border-emerald-500/20");
            } else {
              // Manual Mode Safety Net
              uidField.value = "";
              uidField.readOnly = false;
              uidField.placeholder = "សូមវាយបញ្ចូល UID ឬ Username ដោយដៃទីនេះ...";
              uidField.className = "w-full bg-slate-950 border-amber-500/40 text-amber-400 font-mono text-sm font-semibold rounded-xl px-4 py-3.5 focus:outline-none focus:ring-1 focus:ring-amber-500 transition-all duration-200 tracking-wide shadow-lg shadow-amber-950/10";
              
              label.className = "khmer-font block text-[11px] font-bold uppercase tracking-wider text-amber-400 animate-pulse";
              label.innerText = "សូមបំពេញប្រអប់ខាងក្រោមដោយដៃ / Enter UID Manually *";
              
              updateStatusBadge("Manual Entry Required", "bg-amber-500/10 text-amber-400 border-amber-500/20");
            }
          },
          function(err) {
            updateStatusBadge("Lookup Interrupted", "bg-rose-500/10 text-rose-400 border-rose-500/20");
          }
        );
      }, 700);
    }

    function updateStatusBadge(text, stylingClasses) {
      const badge = document.getElementById("uidStatusBadge");
      badge.innerText = text;
      badge.className = "text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded-md border transition-all duration-200 " + stylingClasses;
    }

    function handleFormSubmit(event) {
      event.preventDefault();
      
      const submitBtn = document.getElementById("submitBtn");
      const select = document.getElementById("memberSelect");
      const selectedOption = select.options[select.selectedIndex];
      const uidValue = document.getElementById("fbUid").value.trim();
      
      if (!selectedOption.value) {
        displayAlert("សូមជ្រើសរើសឈ្មោះសមាជិកក្រុមជាមុនសិន។", false);
        return;
      }

      if (uidValue.includes("Connecting") || !uidValue) {
        displayAlert("សូមបញ្ចូលទិន្នន័យ UID ឱ្យបានត្រឹមត្រូវ ឬរង់ចាំការបំប្លែងលីង។", false);
        return;
      }

      const payload = {
        name: selectedOption.value,
        rowIndex: selectedOption.getAttribute("data-row"),
        link: document.getElementById("fbLink").value.trim(),
        uid: uidValue,
        pw: document.getElementById("fbPw").value.trim(),
        twoFA: document.getElementById("fb2fa").value.trim()
      };

      submitBtn.disabled = true;
      submitBtn.innerHTML = `
        <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span>កំពុងរក្សាទុក... / Syncing Database...</span>
      `;
      submitBtn.className = "w-full bg-slate-900 text-slate-600 font-semibold py-4 px-4 rounded-xl flex items-center justify-center space-x-2 cursor-not-allowed shadow-none border border-slate-800";

      callBackendAPI({ action: "submitAccount", payload: payload },
        function(response) {
          submitBtn.disabled = false;
          submitBtn.innerHTML = `<span>រក្សាទុកទិន្នន័យ / Submit Account</span>`;
          submitBtn.className = "khmer-font w-full bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-500 hover:to-indigo-600 text-white font-semibold py-4 px-4 rounded-xl shadow-xl shadow-indigo-950/50 transition-all duration-200 transform active:scale-[0.995] flex items-center justify-center space-x-2 cursor-pointer";
          
          if (response.success) {
            displayAlert(response.message, true);
            document.getElementById("accountForm").reset();
            updateStatusBadge("No Link", "bg-slate-900 text-slate-500 border-slate-800");
            
            const uidField = document.getElementById("fbUid");
            uidField.readOnly = true;
            uidField.className = "w-full bg-slate-950/30 border border-slate-900/80 text-indigo-400 font-mono text-sm font-semibold rounded-xl px-4 py-3.5 cursor-not-allowed focus:outline-none tracking-wide shadow-inner";
          } else {
            displayAlert(response.message, false);
          }
        },
        function(err) {
          submitBtn.disabled = false;
          submitBtn.innerHTML = `<span>រក្សាទុកទិន្នន័យ / Submit Account</span>`;
          submitBtn.className = "khmer-font w-full bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-500 hover:to-indigo-600 text-white font-semibold py-4 px-4 rounded-xl flex items-center justify-center space-x-2 cursor-pointer";
          displayAlert("Critical communication failure mapping dataset down to the server endpoint layer nodes.", false);
        }
      );
    }

    function displayAlert(message, isSuccess) {
      const alertBox = document.getElementById("statusAlert");
      const iconBox = document.getElementById("statusIcon");
      const msgBox = document.getElementById("statusMessage");
      msgBox.innerText = message;
      
      if (isSuccess) {
        alertBox.className = "mb-6 p-4 rounded-2xl border flex items-start space-x-3 bg-emerald-950/20 border-emerald-500/20 text-emerald-400 backdrop-blur-md";
        iconBox.innerHTML = `<svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
      } else {
        alertBox.className = "mb-6 p-4 rounded-2xl border flex items-start space-x-3 bg-rose-950/20 border-rose-500/20 text-rose-400 backdrop-blur-md";
        iconBox.innerHTML = `<svg class="w-5 h-5 text-rose-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;
      }
      alertBox.classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>
</body>
</html>
